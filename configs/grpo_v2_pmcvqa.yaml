model:
  path: outputs/qwen3.5-2b_pmcvqa_grpo/checkpoint-400
  type: qwen2_vl

dataset:
  type: ds_pmcvqa
  path: dataset/PMC-VQA/train_open_ended.json
  max_samples: 1000
  offset: 1000

grpo:
  output_dir: outputs/qwen3.5-2b_pmcvqa_grpo
  num_generations: 8
  max_prompt_length: 512
  max_completion_length: 1024
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 5e-6
  beta: 0.01
  temperature: 0.9
  top_p: 0.95
  max_steps: 500
  save_steps: 100
  logging_steps: 5
  rewards:
    - format
    - correctness
    - llm_judge
  reward_weights:
    - 0.15
    - 0.50
    - 0.35
