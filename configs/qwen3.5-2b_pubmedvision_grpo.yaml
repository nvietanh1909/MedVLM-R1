model:
  name: qwen3.5-2b_pubmedvision_grpo
  model_path: outputs/qwen3.5-2b_pubmedvision/checkpoint-9518
  load_in_4bit: false
  use_gradient_checkpointing: "unsloth"

lora:
  finetune_vision_layers: true
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true
  r: 16
  lora_alpha: 16
  lora_dropout: 0
  bias: none
  random_state: 3407
  use_rslora: false

dataset:
  type: pubmedvision_grpo
  data_path: dataset/PubMedVision
  json_file: PubMedVision_InstructionTuning_VQA.json
  max_samples: 8000

rewards:
  enabled:
    - medical_judge
  semantic_model: models/S-PubMedBert-MS-MARCO

grpo:
  num_generations: 4
  max_prompt_length: 512
  max_completion_length: 512
  beta: 0.01
  temperature: 0.9
  top_p: 0.95
  learning_rate: 5e-6
  num_train_epochs: 1
  max_steps: -1
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 2
  warmup_steps: 50
  logging_steps: 5
  save_steps: 100
  save_total_limit: 3
  output_dir: outputs/qwen3.5-2b_pubmedvision_grpo
  optim: adamw_8bit
  bf16: true
  fp16: false
  seed: 3407
  report_to: none
